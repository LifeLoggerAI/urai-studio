name: Studio Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm done-done:guard
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: node apps/studio/tests/integrations.test.mjs
      - run: node apps/studio/tests/create-job-validation.test.mjs
      - run: pnpm build
      - run: pnpm --dir functions install --no-frozen-lockfile
      - run: pnpm --dir functions build
      - run: pnpm studio:smoke
