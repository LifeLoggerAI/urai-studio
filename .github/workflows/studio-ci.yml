name: Studio CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: studio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-studio:
    name: Typecheck, lint, test, and build studio
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter studio typecheck

      - name: Lint
        run: pnpm --filter studio lint

      - name: Test
        run: pnpm --filter studio test --if-present

      - name: Build
        run: pnpm --filter studio build
        env:
          NEXT_PUBLIC_SITE_URL: https://www.uraistudio.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
          FIREBASE_PROJECT_ID: ci-placeholder
          FIREBASE_CLIENT_EMAIL: ci@example.com
          FIREBASE_PRIVATE_KEY: ci-placeholder
